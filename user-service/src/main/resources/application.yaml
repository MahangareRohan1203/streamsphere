spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://postgres:5432/streamsphere_video
    username: postgres
    password: password

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
  
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

app:
  cors:
    allowed-origins: "http://localhost:5173"

server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
