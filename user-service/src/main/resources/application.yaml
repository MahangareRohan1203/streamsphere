spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5432/streamsphere
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true


server:
  port: 8082


  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
